<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Routix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <a class="brand" href="/index.html">
        <span class="brand-dot"></span>
        <span>Routix</span>
      </a>
      <h1>Create account</h1>
      <form id="register-form" class="form-grid">
        <label class="form-field">
          <span>Email</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com" />
        </label>
        <label class="form-field">
          <span>Password</span>
          <input type="password" name="password" required minlength="8" autocomplete="new-password" placeholder="Min 8 chars" />
        </label>
        <button id="register-submit" class="btn-primary" type="submit">Create Account</button>
      </form>
      <p class="auth-footer">Already have account? <a href="/login.html">Login</a></p>
    </section>
  </main>

  <div id="toast-root" class="toast-root"></div>
  <script src="./js/runtime-config.js"></script>
  <script type="module" src="./js/register.js"></script>
</body>
</html>
